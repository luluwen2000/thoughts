<!DOCTYPE html>
<html>
<head>
    <title>Thoughts</title>
</head>
<body>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px;">
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <textarea id="thoughtInput1" placeholder="Enter text (Box 1)" rows="3" style="font-family: serif; width: 100%; box-sizing: border-box;"></textarea>
            <button id="addBtn1" style="align-self: flex-start;">Add</button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <textarea id="thoughtInput2" placeholder="Enter text (Box 2)" rows="3" style="font-family: serif; width: 100%; box-sizing: border-box;"></textarea>
            <button id="addBtn2" style="align-self: flex-start;">Add</button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <textarea id="thoughtInput3" placeholder="Enter text (Box 3)" rows="3" style="font-family: serif; width: 100%; box-sizing: border-box;"></textarea>
            <button id="addBtn3" style="align-self: flex-start;">Add</button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <textarea id="thoughtInput4" placeholder="Enter text (Box 4)" rows="3" style="font-family: serif; width: 100%; box-sizing: border-box;"></textarea>
            <button id="addBtn4" style="align-self: flex-start;">Add</button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <textarea id="thoughtInput5" placeholder="Enter text (Box 5)" rows="3" style="font-family: serif; width: 100%; box-sizing: border-box;"></textarea>
            <button id="addBtn5" style="align-self: flex-start;">Add</button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <textarea id="thoughtInput6" placeholder="Enter text (Box 6)" rows="3" style="font-family: serif; width: 100%; box-sizing: border-box;"></textarea>
            <button id="addBtn6" style="align-self: flex-start;">Add</button>
        </div>
    </div>

    <div id="container"></div>

    <script>
        const container = document.getElementById('container');

        let thoughts = [];

        // Load thoughts from the Python backend API
        async function loadThoughts() {
            try {
                const response = await fetch('/api/thoughts');
                if (!response.ok) throw new Error('Failed to fetch thoughts');
                thoughts = await response.json();
                render();
            } catch (e) {
                console.error("Error loading thoughts", e);
                container.innerHTML = '<p style="color: red;">Error connecting to server. Make sure server.py is running.</p>';
            }
        }

        // Render thoughts in the container
        function render() {
            container.innerHTML = '';
            
            if (thoughts.length === 0) {
                container.innerHTML = '<p>No thoughts recorded yet.</p>';
                return;
            }

            thoughts.forEach(thought => {
                const itemDiv = document.createElement('div');
                itemDiv.id = `thought-${thought.index}`;
                itemDiv.style.border = '1px solid #ececec';
                itemDiv.style.borderRadius = '8px';
                itemDiv.style.padding = '12px 16px';
                itemDiv.style.backgroundColor = '#ffffff';
                itemDiv.style.marginBottom = '15px';

                // Display area for text (respect newlines)
                const p = document.createElement('p');
                p.style.whiteSpace = 'pre-wrap';
                p.style.margin = '0 0 5px 0';
                p.style.cursor = 'pointer';
                p.title = 'Click to edit or delete';
                
                // Add the text content
                p.textContent = thought.text + ' ';

                // Append the time inline inside a small span
                const timeSpan = document.createElement('span');
                timeSpan.style.fontSize = '0.8em';
                timeSpan.style.color = '#777';
                timeSpan.style.whiteSpace = 'nowrap';
                timeSpan.textContent = `(${thought.time})`;
                p.appendChild(timeSpan);

                // Clicking the paragraph triggers inline editing
                p.onclick = () => startEdit(thought.index, thought.text, itemDiv, p);

                itemDiv.appendChild(p);
                container.appendChild(itemDiv);
            });
        }

        // Helper to add thought from a specific textarea
        async function addFrom(textarea) {
            const val = textarea.value.trim();
            if (!val) return;

            try {
                const response = await fetch('/api/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: val })
                });
                if (!response.ok) throw new Error('Failed to add thought');
                textarea.value = '';
                await loadThoughts();
            } catch (e) {
                alert("Error saving thought: " + e.message);
            }
        }

        // Add a new thought
        async function add() {
            await addFrom(document.getElementById('thoughtInput1'));
        }

        // Start editing inline in the browser
        function startEdit(index, originalText, itemDiv, p) {
            // Create a wrapper for the editor controls
            const editWrapper = document.createElement('div');

            // Create edit textarea
            const editArea = document.createElement('textarea');
            editArea.rows = 3;
            editArea.cols = 50;
            editArea.style.fontFamily = 'serif';
            editArea.style.display = 'block';
            editArea.style.marginBottom = '5px';
            editArea.value = originalText;
            editWrapper.appendChild(editArea);

            // Create button controls container
            const controls = document.createElement('div');

            const saveBtn = document.createElement('button');
            saveBtn.textContent = 'Save';
            saveBtn.style.marginRight = '5px';
            saveBtn.onclick = async () => {
                const updatedText = editArea.value.trim();
                if (!updatedText) return;
                
                try {
                    const response = await fetch('/api/edit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ index: index, text: updatedText })
                    });
                    if (!response.ok) throw new Error('Failed to update thought');
                    await loadThoughts();
                } catch (e) {
                    alert("Error updating thought: " + e.message);
                }
            };

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Delete';
            deleteBtn.style.marginRight = '5px';
            deleteBtn.onclick = () => deleteThought(index);

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Cancel';
            cancelBtn.onclick = () => {
                loadThoughts(); // Simply re-load to discard edits
            };

            controls.appendChild(saveBtn);
            controls.appendChild(deleteBtn);
            controls.appendChild(cancelBtn);
            editWrapper.appendChild(controls);

            // Swap static paragraph with the edit wrapper
            itemDiv.replaceChild(editWrapper, p);
            
            // Auto-focus the textarea and put cursor at the end
            editArea.focus();
            editArea.setSelectionRange(originalText.length, originalText.length);
        }

        // Delete a thought
        async function deleteThought(index) {
            if (!confirm("Are you sure you want to delete this thought?")) return;

            try {
                const response = await fetch('/api/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ index: index })
                });
                if (!response.ok) throw new Error('Failed to delete thought');
                await loadThoughts();
            } catch (e) {
                alert("Error deleting thought: " + e.message);
            }
        }

        // Bind dynamic add click handlers for all 6 boxes in the grid
        for (let i = 1; i <= 6; i++) {
            const inputEl = document.getElementById(`thoughtInput${i}`);
            const btnEl = document.getElementById(`addBtn${i}`);
            if (inputEl && btnEl) {
                btnEl.onclick = () => addFrom(inputEl);
            }
        }

        // Load initially
        loadThoughts();
    </script>

</body>
</html>
